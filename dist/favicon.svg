<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050b18"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066ff"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="url(#accent)" stroke-width="1.2" opacity="0.6"/>
  <!-- Balance beam top bar -->
  <rect x="8" y="10" width="16" height="1.5" rx="0.75" fill="url(#accent)"/>
  <!-- Center pillar -->
  <rect x="15.25" y="10" width="1.5" height="12" rx="0.75" fill="url(#accent)"/>
  <!-- Left pan string -->
  <line x1="10" y1="11.5" x2="8.5" y2="17" stroke="url(#accent)" stroke-width="0.8" opacity="0.9"/>
  <line x1="10" y1="11.5" x2="11.5" y2="17" stroke="url(#accent)" stroke-width="0.8" opacity="0.9"/>
  <!-- Left pan -->
  <path d="M7.5 17 Q10 18.5 12.5 17" stroke="url(#accent)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Right pan string -->
  <line x1="22" y1="11.5" x2="20.5" y2="17" stroke="url(#accent)" stroke-width="0.8" opacity="0.9"/>
  <line x1="22" y1="11.5" x2="23.5" y2="17" stroke="url(#accent)" stroke-width="0.8" opacity="0.9"/>
  <!-- Right pan -->
  <path d="M19.5 17 Q22 18.5 24.5 17" stroke="url(#accent)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Base -->
  <rect x="13" y="22" width="6" height="1.5" rx="0.75" fill="url(#accent)"/>
  <!-- LM text -->
  <text x="16" y="9" text-anchor="middle" font-family="Arial,sans-serif" font-size="3.5" font-weight="bold" fill="#00d4ff" opacity="0.8">LM</text>
</svg>